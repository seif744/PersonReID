# =============================================================================
# config.yaml -- all the knobs for the pipeline. main.py reads this at startup.
# =============================================================================

source:
  # Default videos (one entry per camera; each gets its own detector/tracker and
  # crops folder). These are just the DEFAULTS -- override them at runtime with
  #   python main.py --videos a.mp4 b.mp4        (or)   --videos-dir /path
  # so you never have to edit this file to process different footage.
  videos:
    - name: cam_219
      path: vlc-record-2026-07-01-17h27m20s-rtsp___192.168.0.219_554_ch01_0-.avi
    - name: cam_224
      path: vlc-record-2026-07-01-17h27m21s-rtsp___192.168.0.224_554_ch01_0-.avi
  # 0 = process the whole video. Set e.g. 60 for a quick CPU smoke test.
  max_frames: 0
  # 0 = native resolution. Positive width downscales every frame (keeps aspect)
  # before detect/track/crop/embed. QHD (2560px) on CPU is very slow; 1280 is a
  # big speedup for dev with little ReID cost. Use 0 for a final full-res run.
  resize_width: 0

detector:
  model: yolo11n.pt          # small YOLO; auto-downloaded on first run
  confidence_threshold: 0.4  # drop boxes less confident than this
  person_class_id: 0         # COCO class 0 = person
  # Pose ensemble: when the box tracker merges two overlapping people into ONE
  # box (e.g. crops/id_0008), a second pose model finds one skeleton per person
  # and we split the box into individual people. Runs a 2nd model per frame.
  pose_ensemble:
    enabled: true
    pose_model: yolo11n-pose.pt   # auto-downloaded on first run
    min_containment: 0.6          # a pose body must be >= this fraction inside a
                                  # tracker box to count as "in it" (split needs 2+)
    conf: 0.25                    # pose model confidence floor

tracker:
  enabled: true
  config: bytetrack.yaml     # ships with ultralytics; "botsort.yaml" also works

crops:
  # OFF by default: embeddings are sent straight to the vector store, no crop
  # files are written. Flip to true only if you want the per-person crop images
  # on disk for debugging or as ReID training data.
  save: false
  dir: crops
  interval: 10               # (only used when save: true) save a crop every N frames
  padding: 0

reid:
  enabled: true
  # OSNet person-ReID weights (dev checkpoint; swap for RandPerson before ship).
  weights: src/reid/weights/osnet_x1_0_msmt17.pth
  device: cpu                # "cuda" if you have a GPU
  interval: 10               # re-embed a given track at most once every N frames
  ttl: 300                   # forget a track from the cache after N unseen frames
  warmup_embeddings: 3       # embed the first N successful observations of a new track
  # Cap on how many embeddings ONE track_id contributes over its life (0 = off).
  # A stable track's global id is ALREADY decided once and never re-matched (see
  # identity/service.py: the (camera, track_id) -> global_id cache), so occlusion
  # cannot flip a track's id regardless of this knob. This cap is a separate
  # PRODUCTION lever: it stops re-embedding a settled track, saving forward passes
  # and keeping later (occluded) frames out of the gallery -- valuable when tracks
  # run for minutes across hundreds of cameras.
  #   TRADE-OFF (measured on the sample clip): fewer views -> weaker per-track
  #   prototype -> the borderline cross-camera match (cosine ~0.87 vs threshold
  #   0.85) is LOST. So it defaults OFF; only enable it for long-track / high-
  #   camera-count deployments, and keep it >= reconcile.min_tracklet_observations.
  max_embeddings_per_track: 0
  quality:
    enabled: true            # reject bad crops before embedding/storing
    min_width: 24
    min_height: 64
    min_area: 2500
    min_box_area_ratio: 0.002
    min_blur: 20.0           # Laplacian variance; raise if blurry crops leak in
    min_brightness: 20.0
    max_brightness: 235.0
    min_aspect: 0.20         # width / height
    max_aspect: 1.20
    max_occlusion_ratio: 0.5 # reject a crop if another person's box covers more
                             # than this fraction of it (multi-person crop)

# Vector store (Qdrant). Inference owns this gallery end-to-end: it writes
# embeddings AND assigns identities against it -- no separate registration step,
# no external service. This is the ONLY store the pipeline uses.
store:
  enabled: true
  path: qdrant_data          # persistent LOCAL Qdrant folder (dev / single process)
  # For PRODUCTION, point at a Qdrant SERVER instead of the local folder. Set the
  # url here (non-secret) OR via the QDRANT_URL env var; when a url is present it
  # overrides `path`. The API key is a SECRET -- read only from the QDRANT_API_KEY
  # env var (see .env), never from this committed file.
  url: http://localhost:6333 # local Docker Qdrant server; clear this to use path

# Identity Service (Stage 7): turns stored embeddings into stable global ids,
# merging tracks/cameras that are the same person into one identity.
identity:
  enabled: true
  threshold: 0.63 # cosine to accept a match (used only when verification.enabled
                             # is false, below). CALIBRATE per deployment -- measured
                             # on this project's footage with osnet_x1_0_msmt17:
                             # different people's prototype cosine tops out ~0.57,
                             # genuine cross-video same-person matches reach 0.70-0.80.
                             # Re-measure (see src/identity/demo_identity.py's sweep)
                             # if the ReID weights or camera domain change.
  top_k: 50                  # nearest candidates to consider before deciding
  bank_size: 20              # recent good embeddings kept per global identity
  min_score_gap: 0.03        # best identity must beat runner-up by this much

  # ADR-002 Upgrade 1: camera-aware re-ranking (real k-reciprocal + Jaccard,
  # CVPR'24 CA-Jaccard) over identity prototypes, between raw KNN candidate
  # retrieval and the accept/reject decision. See src/identity/reranking.py.
  rerank:
    enabled: true
    k1: 8                          # neighbourhood size for reciprocal-set construction
    cross_camera_k1_boost: 4       # widen k1 by this much for cross-camera reciprocity
                                    # checks, since cross-camera similarity runs lower
    lambda_: 0.7                   # final_score = lambda*cosine + (1-lambda)*(1-jaccard_dist)

  # ADR-002 Upgrade 2: verification layer. Replaces the rigid
  # threshold+min_score_gap gate with a scored combination of signals. This is a
  # HEURISTIC (hand-set weights) for now -- every decision's feature vector is
  # logged to log_path so a real MLP/GBT can be trained on accumulated
  # deployment data later, with no change to the calling code.
  # See src/identity/verifier.py.
  verification:
    enabled: true
    accept_threshold: 0.55   # P(same identity) must clear this to accept
    min_prob_gap: 0.05       # winner must beat runner-up P(same) by this much
    log_path: logs/verification_decisions.jsonl

  # Offline reconciliation (Stage 7b): after ALL cameras finish, rebuild global
  # ids from camera-local tracklets and merge the ones that are the same person
  # across cameras -- e.g. someone who entered two cameras at the same instant,
  # which the sticky live decision cannot catch.
  reconcile:
    enabled: true
    threshold: 0.63          # prototype cosine to merge cross-camera; blank = use
                             # identity.threshold. Set explicitly here because this
                             # runs independently of the verifier (see verifier.py) --
                             # it must be recalibrated whenever identity.threshold is.
    same_camera_threshold: 0.90  # stricter merge for fragmented tracks in one camera
    min_tracklet_observations: 3  # a real identity needs >= this many observations;
                                   # shorter tracks are detector noise, not people
    require_reciprocal_best: true      # merge a pair only if they are each other's best
                                       # match -- stops look-alike over-merging on
                                       # weak/out-of-domain models. See reconcile.py.

display:
  show_window: false         # true = live OpenCV windows; false = headless
  save_annotated: true       # write output_<name>.mp4 with boxes + ids
  window_scale: 1.0
