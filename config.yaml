# =============================================================================
# config.yaml -- all the knobs for the pipeline. main.py reads this at startup.
# =============================================================================

source:
  # Default videos (one entry per camera; each gets its own detector/tracker and
  # crops folder). These are just the DEFAULTS -- override them at runtime with
  #   python main.py --videos a.mp4 b.mp4        (or)   --videos-dir /path
  # so you never have to edit this file to process different footage.
  videos:
    - name: cam_219
      path: vlc-record-2026-07-01-17h27m20s-rtsp___192.168.0.219_554_ch01_0-.avi
    - name: cam_224
      path: vlc-record-2026-07-01-17h27m21s-rtsp___192.168.0.224_554_ch01_0-.avi
  # 0 = process the whole video. Set e.g. 60 for a quick CPU smoke test.
  max_frames: 0
  # 0 = native resolution. Positive width downscales every frame (keeps aspect)
  # before detect/track/crop/embed. QHD (2560px) on CPU is very slow; 1280 is a
  # big speedup for dev with little ReID cost. Use 0 for a final full-res run.
  resize_width: 0

  # LIVE STREAMS (rtsp:// / http:// / ... URLs). A run is "live" if ANY --videos
  # entry (or a videos[].path here) is a URL. A live run is TWO phases (see
  # main.py run_capture_phase): Phase 1 cheaply RECORDS each raw stream to
  # recorded_<name>.mp4 (decode + write only, NO detection -- so it keeps up with
  # several cameras) while showing an optional monitoring window; on 'q'/Ctrl-C
  # Phase 2 runs the ORDINARY batch pipeline on those recordings, producing the
  # same reconciled output_<name>.mp4 as a video-file run (full fps, full
  # quality). These knobs apply to Phase 1 capture and are IGNORED for files.
  stream:
    reconnect_attempts: 5      # consecutive failed reads before giving up on a stream
    reconnect_backoff: 1.0     # seconds; actual wait grows with the failure streak
    drop_stale: true           # (live monitoring only) keep only the newest frame.
                               # Phase-1 RECORDING always keeps every frame
                               # regardless, so the output isn't decimated.

detector:
  model: yolo11n.pt          # small YOLO; auto-downloaded on first run
  confidence_threshold: 0.4  # drop boxes less confident than this
  person_class_id: 0         # COCO class 0 = person
  # Pose ensemble: when the box tracker merges two overlapping people into ONE
  # box (e.g. crops/id_0008), a second pose model finds one skeleton per person
  # and we split the box into individual people. Runs a 2nd model per frame.
  pose_ensemble:
    enabled: true
    pose_model: yolo11n-pose.pt   # auto-downloaded on first run
    min_containment: 0.6          # a pose body must be >= this fraction inside a
                                  # tracker box to count as "in it" (split needs 2+)
    conf: 0.25                    # pose model confidence floor

tracker:
  enabled: true
  config: bytetrack.yaml     # ships with ultralytics; "botsort.yaml" also works

crops:
  # OFF by default: embeddings are sent straight to the vector store, no crop
  # files are written. Flip to true only if you want the per-person crop images
  # on disk for debugging or as ReID training data.
  save: false
  dir: crops
  interval: 10               # (only used when save: true) save a crop every N frames
  padding: 0

reid:
  enabled: true
  # OSNet-AIN person-ReID weights: same torchreid OSNet family as before, with
  # Adaptive Instance Normalization for better generalization to unseen (this
  # project's out-of-domain CCTV) footage. Swapped from plain osnet_x1_0 because
  # that model's embeddings weren't discriminative enough on this footage
  # (same-person cross-camera ~0.72 vs different-person ~0.55 -- too close).
  # Multi-source domain-generalization checkpoint (trained on Duke+Market+CUHK03,
  # evaluated on MSMT17 as the unseen domain) from the torchreid Model Zoo.
  weights: src/reid/weights/osnet_ain_x1_0.pth
  device: cpu                # "cuda" if you have a GPU
  interval: 10               # re-embed a given track at most once every N frames
  ttl: 300                   # forget a track from the cache after N unseen frames
  warmup_embeddings: 3       # embed the first N successful observations of a new track
  # Cap on how many embeddings ONE track_id contributes over its life (0 = off).
  # A stable track's global id is ALREADY decided once and never re-matched (see
  # identity/service.py: the (camera, track_id) -> global_id cache), so occlusion
  # cannot flip a track's id regardless of this knob. This cap is a separate
  # PRODUCTION lever: it stops re-embedding a settled track, saving forward passes
  # and keeping later (occluded) frames out of the gallery -- valuable when tracks
  # run for minutes across hundreds of cameras.
  #   TRADE-OFF (measured on the sample clip): fewer views -> weaker per-track
  #   prototype -> the borderline cross-camera match (cosine ~0.87 vs threshold
  #   0.85) is LOST. So it defaults OFF; only enable it for long-track / high-
  #   camera-count deployments, and keep it >= reconcile.min_tracklet_observations.
  max_embeddings_per_track: 0
  quality:
    enabled: true            # reject bad crops before embedding/storing
    min_width: 24
    min_height: 64
    min_area: 2500
    min_box_area_ratio: 0.002
    min_blur: 20.0           # Laplacian variance; raise if blurry crops leak in
    min_brightness: 20.0
    max_brightness: 235.0
    min_aspect: 0.20         # width / height
    max_aspect: 1.20
    max_occlusion_ratio: 0.5 # reject a crop if another person's box covers more
                             # than this fraction of it (multi-person crop).
                             # Tried tightening to 0.35 after the osnet_ain_x1_0
                             # swap to fight a rare occlusion-triggered false
                             # merge, but it measurably hurt overall accuracy
                             # (97% -> 89%) by rejecting too many real crops.
                             # Reverted -- see identity.verification comments.

# Vector store (Qdrant). Inference owns this gallery end-to-end: it writes
# embeddings AND assigns identities against it -- no separate registration step,
# no external service. This is the ONLY store the pipeline uses.
store:
  enabled: true
  path: qdrant_data          # persistent LOCAL Qdrant folder (dev / single process)
  # For PRODUCTION, point at a Qdrant SERVER instead of the local folder. Set the
  # url here (non-secret) OR via the QDRANT_URL env var; when a url is present it
  # overrides `path`. The API key is a SECRET -- read only from the QDRANT_API_KEY
  # env var (see .env), never from this committed file.
  url: http://localhost:6333 # local Docker Qdrant server; clear this to use path

# Identity Service (Stage 7): turns stored embeddings into stable global ids,
# merging tracks/cameras that are the same person into one identity.
identity:
  enabled: true
  threshold: 0.63 # cosine to accept a match (used only when verification.enabled
                             # is false, below). CALIBRATE per deployment -- measured
                             # on this project's footage with osnet_x1_0_msmt17:
                             # different people's prototype cosine tops out ~0.57,
                             # genuine cross-video same-person matches reach 0.70-0.80.
                             # Re-measure (see src/identity/demo_identity.py's sweep)
                             # if the ReID weights or camera domain change. Left at
                             # 0.63 after the osnet_ain_x1_0 swap: raising it to 0.68
                             # alongside the verifier changes below measurably hurt
                             # accuracy (97% -> 89%) and was reverted. Note this knob
                             # isn't even on the live decision path while
                             # verification.enabled is true, below -- see there.
  top_k: 50                  # nearest candidates to consider before deciding
  bank_size: 20              # recent good embeddings kept per global identity
  min_score_gap: 0.03        # best identity must beat runner-up by this much

  # ADR-002 Upgrade 1: camera-aware re-ranking (real k-reciprocal + Jaccard,
  # CVPR'24 CA-Jaccard) over identity prototypes, between raw KNN candidate
  # retrieval and the accept/reject decision. See src/identity/reranking.py.
  rerank:
    enabled: true
    k1: 8                          # neighbourhood size for reciprocal-set construction
    cross_camera_k1_boost: 4       # widen k1 by this much for cross-camera reciprocity
                                    # checks, since cross-camera similarity runs lower
    lambda_: 0.7                   # final_score = lambda*cosine + (1-lambda)*(1-jaccard_dist)

  # ADR-002 Upgrade 2: verification layer. Replaces the rigid
  # threshold+min_score_gap gate with a scored combination of signals. This is a
  # HEURISTIC (hand-set weights) for now -- every decision's feature vector is
  # logged to log_path so a real MLP/GBT can be trained on accumulated
  # deployment data later, with no change to the calling code.
  # See src/identity/verifier.py.
  verification:
    enabled: true
    accept_threshold: 0.55   # P(same identity) must clear this to accept. Tried
                             # raising to 0.62 after the osnet_ain_x1_0 swap (to
                             # fight a rare occlusion-triggered false merge), but
                             # it measurably hurt overall accuracy (97% -> 89%,
                             # more false splits) and was reverted. The false
                             # merge is better fixed at its root cause (bad crop
                             # during occlusion) than by raising the global bar.
    min_prob_gap: 0.05       # winner must beat runner-up P(same) by this much.
                             # Same revert as accept_threshold above.
    log_path: logs/verification_decisions.jsonl

  # Offline reconciliation (Stage 7b): after ALL cameras finish, rebuild global
  # ids from camera-local tracklets and merge the ones that are the same person
  # across cameras -- e.g. someone who entered two cameras at the same instant,
  # which the sticky live decision cannot catch.
  reconcile:
    enabled: true
    threshold: 0.63          # prototype cosine to merge cross-camera; blank = use
                             # identity.threshold. Set explicitly here because this
                             # runs independently of the verifier (see verifier.py) --
                             # it must be recalibrated whenever identity.threshold is.
                             # Left at 0.63 after the osnet_ain_x1_0 swap -- see
                             # identity.threshold comment above for why the raise
                             # to 0.68 was reverted.
    same_camera_threshold: 0.90  # stricter merge for fragmented tracks in one camera
    min_tracklet_observations: 3  # a real identity needs >= this many observations;
                                   # shorter tracks are detector noise, not people
    require_reciprocal_best: true      # merge a pair only if they are each other's best
                                       # match -- stops look-alike over-merging on
                                       # weak/out-of-domain models. See reconcile.py.

  # ONLINE decision core (Stage 7c): DORMANT under the current record-then-batch
  # live design (kept OFF). It exists to make LIVE on-screen ids good when the
  # pipeline decides identity in real time. But we switched RTSP to a two-phase
  # design -- record the raw stream, then run the ordinary OFFLINE reconcile on
  # the recording (see source.stream) -- so the saved MP4's ids come from the
  # same offline reconcile as a file run, and there is no live per-frame decision
  # to improve. Leave enabled: false. (Re-enable only if a live, boxes-on-screen
  # preview with good ids is wanted; the implementation in
  # src/identity/service.py `_assign_online` mirrors reconcile: aggregate +
  # evidence gate + two-lane match + split-only late-correction.)
  online:
    enabled: false
    min_evidence_obs: 3            # commit a track only after this many good views
                                   # (live analogue of reconcile.min_tracklet_observations)
    same_camera_threshold: 0.90    # same-camera lane: re-acquire a dropped track
    cross_camera_threshold: 0.63   # cross-camera lane: link the same person across cams
    online_min_margin: 0.03        # cross-camera winner must beat runner-up by this
                                   # (blank -> identity.min_score_gap)
    late_correction_window: 30     # frames after resolving during which a track may
                                   # still SPLIT to a new id if its aggregate contradicts
                                   # -- the offline-approximation dial (longer = closer
                                   # to offline, more settling latency)
    split_contradiction_margin: 0.05  # how far below the admitting threshold the grown
                                      # aggregate must fall to trigger a split
    online_state_ttl: 300          # forget a track's online state after N unseen frames
                                   # (mirror reid.ttl)
    transition:
      enabled: false               # camera-transition veto: OFF (no topology). When you
                                   # can supply adjacency + transit times, enabling this
                                   # makes physically-impossible cross-camera jumps a hard
                                   # veto -- the biggest cross-camera false-merge cut.

display:
  show_window: false         # true = OpenCV windows; false = headless. For a LIVE
                             # run this also controls the Phase-1 raw monitoring
                             # window (shown only if the display can open one).
                             # File runs / Phase-2 processing honor it as-is.
  save_annotated: true       # write output_<name>.mp4 with boxes + ids
  window_scale: 1.0
  output_fps: 20.0           # fps for the saved/annotated output videos. Not read
                             # from the source (a file run uses this regardless of
                             # the source's real fps).

# Live-stream output handling (see source.stream for the two-phase design).
output:
  keep_recording: false      # false = delete recorded_<name>.mp4 once the final
                             # output_<name>.mp4 is produced. true = keep the raw
                             # capture (e.g. to re-process or audit it).
  fps_default: 20            # fps stamped on the Phase-1 recording (RTSP CAP_PROP_FPS
                             # is unreliable). Frame COUNT is preserved either way,
                             # so the output is never decimated.

# =============================================================================
# v5 REAL-TIME LIVE PIPELINE (src/live/) -- staged build; see the architecture
# plan. This is a SEPARATE path from the file-batch flow above; when inactive
# (run.mode: batch, or file inputs) nothing here runs and batch behaviour is
# unchanged. Stage 0 wires capability detection + routing only; later stages
# add capture/scheduler/inference/identity/render/writer. Config is grouped to
# match the handoff; unknown-to-a-stage keys are simply ignored until built.
# =============================================================================
live:
  run:
    mode: auto              # auto (live if any source is a URL) | live | batch
    device: auto            # auto (GPU if available else CPU) | cuda:0 | cpu
    max_duration_sec: 0     # 0 = until stopped (q / Ctrl-C)
  capture:
    nvdec: auto             # auto | on | off. NVDEC decode is a SERVER task; CPU
                            # decode is used until a GPU decode lib is available.
    reconnect_attempts: 5
    reconnect_base_delay: 1
    reconnect_max_delay: 30
    max_frame_staleness_ms: 100   # scheduler skips frames older than this
  inference:
    max_batch_size: 8       # forced to 1 on CPU (device-aware)
    t_batch_ms: 15          # dispatch a batch at max_batch_size OR this timeout
    max_inference_queue: 2
    max_skip_cycles: 2      # scheduler starvation bound (fresh cam not skipped > N cycles)
  identity:
    max_queue: 64           # bound of the identity input queue AND of each
                            # per-camera lane in the anti-starvation fair buffer
    assign_latency_budget_ms: 5
    min_evidence_obs: 3     # evidence gate before ASSIGNED (never assign on 1st obs)
    same_camera_threshold: 0.90   # same-camera lane: cold reactivation of a dropped
                                  # then re-acquired track (strict; ported)
    cross_camera_threshold: 0.63  # cross-camera lane: link the same person across cams
    accept_margin: 0.03     # cross-camera runner-up margin (ported from identity.min_score_gap)
    bank_size: 20           # exemplar embeddings kept per live identity; scoring
                            # blends the bank MEAN (prototype) with the strongest
                            # single exemplar (medoid-style) -- ported from
                            # identity.bank_size / service.py::_bank_score
    split_contradiction_margin: 0.05
  output:
    write_video: true
    video_path: output_<cam>.mp4
    codec: h264             # software x264; falls back to mp4v
    pacing: wallclock
    fps_default: 20
    resolution: native
    max_writer_queue: 16
    offline_overlay_after_sec: 3   # after this gap, write CAMERA OFFLINE frames
  metrics:
    log_interval_sec: 10
    report_peaks: true
  # Cross-camera physical-impossibility veto (Stage 3, §5). FAIL-OPEN: when
  # disabled or with no edges, appearance alone decides every link, and any
  # camera NOT named below is never blocked. Camera names MUST match the runtime
  # names -- stream URLs are auto-named cam_<last-IP-octet> (see main.py
  # _camera_name_from_source), so the mapping is: camera1=cam_224, camera2=cam_219,
  # camera3=cam_213 (chokepoint), camera4=cam_206.
  topology:
    # Cross-camera physical-impossibility veto -- DISABLED (appearance-only).
    # A transit-time veto needs a trustworthy MINIMUM seconds per hop, and we do
    # NOT have measured values. Guessing them backfires: a too-high min false-splits
    # a real cross-camera match (exactly the bug that made cross-camera linking
    # never fire), and people move between cameras at variable speed, so no single
    # hardcoded min is correct. So cross-camera merges are guarded by APPEARANCE +
    # reciprocal-best + runner-up margin + the same-camera overlap veto -- which is
    # also the handoff's fail-open default until real topology data exists.
    enabled: false
    # To RE-ENABLE later with MEASURED times: set enabled: true and add edges as
    # [cam_a, cam_b, min_transit_sec] (undirected; multi-hop auto-summed along the
    # shortest path). Co-visible/overlapping pairs use 0 (no time veto). Template
    # for this site (cam_213 is the sole chokepoint in/out of cam_206):
    #   edges:
    #     - [cam_224, cam_219, 0]   # same room, co-visible -> no min
    #     - [cam_224, cam_213, ?]   # measure
    #     - [cam_219, cam_213, ?]   # measure
    #     - [cam_213, cam_206, ?]   # measure
  limits:
    max_active_identities: 200  # LRU cap on the in-memory active set (bounds memory)
    active_ttl: 300         # SECONDS unseen before a live identity is evicted from
                            # the active set. NOTE: the live engine reasons in
                            # wall-clock seconds (frame.ts), not frames -- frames are
                            # per-camera and get dropped, so they aren't comparable
                            # across the pipeline. Keep this GENEROUSLY larger than a
                            # typical absence: an identity must survive a person's
                            # time off-screen for same-camera cold reactivation and
                            # cross-camera linking to reuse it rather than mint anew.
    queue_warn_pct: 80
    drop_warn_pct: 5
